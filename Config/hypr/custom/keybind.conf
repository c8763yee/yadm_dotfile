unbind = , F10
unbind = , F11
unbind = , F12

unbind = $mainMod Shift, F

bindd=$mainMod Shift, f , maximize window, fullscreen, 1
bindd=$mainMod, f, $d toggle pin on focused window, exec, hyde-shell window.pin
bindd=ALT, SPACE, $d application finder , exec, pkill -x rofi || $rofi-launch d

bindd=Control Shift, A, $d next waywallen wallpaper, exec, busctl --user call org.waywallen.waywallen.Daemon /org/waywallen/waywallen/Daemon org.waywallen.waywallen.Daemon1 Next
bindd=$mainMod, D, $d toggle show desktop, exec, $HOME/.config/hypr/custom/scripts/toggle-show-desktop.sh
# bindd=SUPER, $d start menu, exec, pkill -x rofi || $rofi-launch d
